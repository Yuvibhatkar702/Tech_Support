services:
  # Frontend Static Site (free)
  - type: web
    name: tech-support-client
    runtime: static
    plan: static
    rootDir: client
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
